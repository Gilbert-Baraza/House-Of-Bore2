<!-- templates/dashboard/breadcrumbs.html -->
<nav aria-label="Breadcrumb" class="flex items-center space-x-2 text-xs text-neutral-500 overflow-x-auto">
  <a href="{% url 'dashboard:home' %}" class="hover:text-neutral-900 font-medium transition-colors">Dashboard</a>
  {% if active_nav and active_nav != 'dashboard' %}
    <svg class="h-3.5 w-3.5 text-neutral-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    <span class="font-semibold text-neutral-900 capitalize">{{ active_nav|title }}</span>
  {% endif %}
</nav>
