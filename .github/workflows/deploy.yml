name: Continuous Deployment & Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on semantic version release tags e.g. v1.0.0
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      release_notes:
        description: 'Brief description of release changes'
        required: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. PRE-DEPLOYMENT VERIFICATION & AUDIT
  # ────────────────────────────────────────────────────────────────────────────
  pre-deploy-verify:
    name: Verify Production Readiness
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: house_of_bore_deploy_check
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: deploy_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements/*.txt'

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Production Dependencies & Build Static Assets
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/production.txt
          python manage.py tailwind install
          python manage.py tailwind build

      - name: Verify Migrations and WhiteNoise Manifest Collection
        env:
          DJANGO_ENV: production
          SECRET_KEY: deploy-check-secret-key-999888777
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: house_of_bore_deploy_check
          DB_USER: postgres
          DB_PASSWORD: deploy_test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          REDIS_CACHE_URL: redis://localhost:6379/1
        run: |
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput --clear
          python manage.py check --deploy

  # ────────────────────────────────────────────────────────────────────────────
  # 2. STAGING / PRODUCTION DEPLOYMENT (SSH / Systemd Deployment Example)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-to-server:
    name: Deploy to Server (${{ github.event.inputs.environment || 'staging' }})
    needs: pre-deploy-verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Prepare Deployment Environment Variable
        id: env-name
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "TARGET_ENV=production" >> $GITHUB_OUTPUT
          fi

      - name: Log Deployment Initiation
        run: |
          echo "Starting automated deployment to: ${{ steps.env-name.outputs.TARGET_ENV }} for release: ${{ github.ref_name }}"

      # ────────────────────────────────────────────────────────────────────────
      # EXAMPLE SSH DEPLOYMENT STEP (Uncomment when live server credentials are added to GitHub Secrets)
      # ────────────────────────────────────────────────────────────────────────
      # - name: Execute SSH Zero-Downtime Deployment on Target Server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     port: ${{ secrets.DEPLOY_PORT || 22 }}
      #     script: |
      #       cd /var/www/house-of-bore
      #       git fetch --all --tags
      #       git checkout ${{ github.ref_name }}
      #       source venv/bin/activate
      #       pip install -r requirements/production.txt
      #       python manage.py migrate --noinput
      #       python manage.py tailwind install && python manage.py tailwind build
      #       python manage.py collectstatic --noinput --clear
      #       sudo systemctl reload house-of-bore.service
      #       sudo systemctl restart house-of-bore-celery.service
      #       curl -f https://house-of-bore.com/health/ready/ || (echo "DEPLOY FAILED: Rollback required!" && exit 1)

      - name: Deployment Success Notification
        run: |
          echo "Deployment verification steps passed cleanly. Pipeline ready."
