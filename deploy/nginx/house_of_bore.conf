# deploy/nginx/house_of_bore.conf
# ──────────────────────────────────────────────────────────────────────────────
# WHY THIS FILE EXISTS:
#   Production Nginx reverse proxy configuration for House of Bore.
#   Handles TLS termination, static/media file serving, gzip compression,
#   security headers, rate limiting, and request proxying to Gunicorn.
#
# INSTALLATION:
#   sudo cp deploy/nginx/house_of_bore.conf /etc/nginx/sites-available/house_of_bore
#   sudo ln -s /etc/nginx/sites-available/house_of_bore /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS SETUP:
#   Use Certbot for free Let's Encrypt certificates:
#   sudo certbot --nginx -d house-of-bore.com -d www.house-of-bore.com
# ──────────────────────────────────────────────────────────────────────────────

# ─── Rate Limiting Zone ──────────────────────────────────────────────────────
# Shared memory zone for tracking request rates per client IP.
# 10m = ~160,000 unique IPs tracked. 10r/s = 10 requests per second per IP.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ─── Upstream — Gunicorn Application Server ──────────────────────────────────
upstream house_of_bore_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name house-of-bore.com www.house-of-bore.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ─── HTTPS Server Block ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name house-of-bore.com www.house-of-bore.com;

    # ── TLS Configuration ────────────────────────────────────────────────────
    # Certificate paths managed by Certbot (Let's Encrypt).
    # Replace with your certificate paths if using a different CA.
    ssl_certificate     /etc/letsencrypt/live/house-of-bore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/house-of-bore.com/privkey.pem;

    # TLS 1.2+ only — disable older insecure protocols.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # OCSP Stapling — validates certificate status without client-side lookups.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Request Size Limits ──────────────────────────────────────────────────
    # Maximum allowed size of the client request body.
    # 10MB covers product image uploads. Increase if video uploads are needed.
    client_max_body_size 10m;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    # Compress text-based responses to reduce bandwidth and improve TTFB.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────────────────────────────────
    # These headers complement Django's SecurityMiddleware settings.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strict-Transport-Security (HSTS) — 1 year, include subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content-Security-Policy (foundation) — restrictive but functional.
    # Start in report-only mode, then switch to enforcing after testing.
    # add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.paypal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://www.paypal.com; base-uri 'self'; form-action 'self';" always;

    # ── Static Files ─────────────────────────────────────────────────────────
    # Served directly by Nginx — bypasses Gunicorn for maximum performance.
    # WhiteNoise adds content-hash fingerprints, enabling far-future caching.
    location /static/ {
        alias /var/www/house-of-bore/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media Files (User Uploads) ───────────────────────────────────────────
    # Served by Nginx when using local filesystem storage.
    # When Cloudinary is configured, media is served from their CDN instead.
    location /media/ {
        alias /var/www/house-of-bore/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon ──────────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /var/www/house-of-bore/staticfiles/images/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Health Check Endpoints ───────────────────────────────────────────────
    # No rate limiting on health checks — used by load balancers and monitoring.
    location /health/ {
        proxy_pass http://house_of_bore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Login Rate Limiting ──────────────────────────────────────────────────
    # Aggressive rate limiting on authentication endpoints to prevent brute force.
    location /login/ {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://house_of_bore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Webhook Endpoints ────────────────────────────────────────────────────
    # Payment webhooks need higher body size limits for some providers.
    location /payments/webhooks/ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 1m;

        proxy_pass http://house_of_bore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Application (catch-all) ──────────────────────────────────────────────
    # All other requests are proxied to Gunicorn.
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://house_of_bore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support (future-proofing for real-time features).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout for proxied requests (matches Gunicorn timeout).
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
        proxy_read_timeout 120;
    }

    # ── Error Pages ──────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/house-of-bore/staticfiles/;
        internal;
    }
}
